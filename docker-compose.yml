services:
  pms_app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: pms_app
    restart: unless-stopped
    volumes:
      - .:/var/www/pms
    depends_on:
      pms_db:
        condition: service_healthy
      pms_redis:
        condition: service_started
    networks:
      - pms_network
    environment:
      - APP_ENV=local

  pms_queue:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: pms_queue
    restart: unless-stopped
    command: ["php", "artisan", "queue:work", "--tries=3", "--sleep=3"]
    volumes:
      - .:/var/www/pms
    depends_on:
      pms_db:
        condition: service_healthy
      pms_redis:
        condition: service_started
    networks:
      - pms_network

  pms_webserver:
    image: nginx:stable-alpine
    container_name: pms_webserver
    restart: unless-stopped
    ports:
      - "8001:80"
    volumes:
      - .:/var/www/pms
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - pms_app
    networks:
      - pms_network

  pms_db:
    image: postgres:16
    container_name: pms_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: nomadeo_pms
      POSTGRES_USER: pms_user
      POSTGRES_PASSWORD: pms_password
    ports:
      - "5433:5432"
    volumes:
      - pms_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pms_user -d nomadeo_pms"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - pms_network

  pms_redis:
    image: redis:7.2-alpine
    container_name: pms_redis
    restart: unless-stopped
    ports:
      - "6380:6379"
    networks:
      - pms_network

networks:
  pms_network:
    driver: bridge

volumes:
  pms_postgres_data:
